name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      # Same checks as `make validate`, but format is --check (CI must not
      # mutate the tree) and each step is named so failures are obvious.
      - name: Format
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run --with pyright pyright .

      - name: Test
        run: uv run pytest tests/
